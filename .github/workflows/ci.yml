name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BUN_VERSION: "1.3.14"

jobs:
    quality:
        name: Quality, tests, and build
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
              with:
                  path: suite/compiler
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - name: Install target shells on Linux
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install --yes fish zsh
            - name: Install target shells on macOS
              if: runner.os == 'macOS'
              run: brew install fish
            - run: bun install --frozen-lockfile
              working-directory: suite/compiler
            - run: bun run check
              working-directory: suite/compiler
            - run: bun run build
              working-directory: suite/compiler

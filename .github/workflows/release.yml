name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
              with:
                  path: suite/compiler
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/types
                  path: suite/types
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"
            - run: bun install --frozen-lockfile
              working-directory: suite/compiler
            - run: bun run check && bun run build
              working-directory: suite/compiler
            - name: Publish compiler packages
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  bun publish --cwd packages/config --access public --tolerate-republish
                  bun publish --cwd packages/compiler --access public --tolerate-republish
              working-directory: suite/compiler
            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag
              working-directory: suite/compiler
